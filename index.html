<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Cyber URL Analyzer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="link.ico">
  <style>
@import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap");

:root {
  --cyber: #00e7ff;
  --cyber-soft: #7df9ff;
  --bg: #020617;
  --panel: #020617;
  --border: #0f2a33;
  --text-dim: #7dd3fc;
}

* {
  box-sizing: border-box;
  font-family: "JetBrains Mono", monospace;
}

body {
  margin: 0;
  background: radial-gradient(circle at top, #04131a, #020617 60%);
  color: var(--cyber);
  overflow-x: hidden;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(0, 231, 255, 0.03),
    rgba(0, 231, 255, 0.03) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events: none;
  z-index: 5;
}

.top-bar {
  padding: 20px 30px;
  border-bottom: 1px solid var(--border);
}

.top-bar h1 {
  margin: 0;
  text-shadow: 0 0 10px var(--cyber);
}

.top-bar p {
  margin-top: 4px;
  font-size: 13px;
  color: var(--text-dim);
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 40px 20px;
}

.card {
  background: linear-gradient(
    180deg,
    rgba(0, 231, 255, 0.03),
    rgba(0, 0, 0, 0.3)
  );
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 30px;
}

.input-box {
  display: flex;
  align-items: center;
  gap: 10px;
}

.input-box span {
  color: var(--text-dim);
}

input {
  flex: 1;
  background: black;
  border: 1px solid var(--cyber);
  padding: 10px;
  color: var(--cyber);
}

button {
  padding: 10px 22px;
  background: transparent;
  border: 1px solid var(--cyber);
  color: var(--cyber);
  cursor: pointer;
}

.loader {
  margin: 20px auto 0;
  width: 42px;
  height: 42px;
  border: 3px solid var(--cyber);
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.hidden { display: none; }

.footer {
  border-top: 1px solid var(--border);
  padding: 30px 20px;
  text-align: center;
  color: var(--text-dim);
  font-size: 13px;
}
  </style>
</head>

<body>

<header class="top-bar">
  <h1>🛡 AI CYBER URL ANALYZER</h1>
  <p>> Advanced Phishing Detection Engine v4.0</p>
</header>

<main class="container">
  <div class="card">
    <label>Target URL</label>
    <div class="input-box">
      <span>root@cyber:~$</span>
      <input id="urlInput" placeholder="https://example.com" />
      <button onclick="analyze()">SCAN</button>
    </div>

    <div id="loader" class="loader hidden"></div>
    <div id="loaderText" class="hidden" style="text-align:center;font-size:12px;margin-top:8px;">
      Initializing AI… <span id="timer">3</span>s
    </div>
  </div>

  <div id="result" class="card hidden">
    <pre id="terminalOutput"></pre>
  </div>
</main>

<footer class="footer">
  <p>Client-side phishing detection using TensorFlow.js</p>
  <p>Built by <strong>Tirth Bhatt</strong> © 2026</p>
</footer>

<!-- TFJS FIRST -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.18.0/dist/tf.min.js"></script>
<script>
let model = null;
let scaler = null;
let aiReady = false;

/* LOAD AI MODEL & SCALER */
async function loadAI() {
  try {
    // Load the model
    model = await tf.loadLayersModel("./model/model.json");

    // Load the scaler
    scaler = await fetch("./scaler.json").then(r => r.json());
    if (!scaler.mean || !scaler.scale) {
      throw new Error("Invalid scaler.json");
    }

    // If model input shape is missing, build it dynamically
    if (!model.inputs || model.inputs.length === 0) {
      console.warn("Model missing input shape. Building manually...");
      const inputDim = scaler.mean.length;
      model.build([null, inputDim]);
      console.log(`Model built with input shape [null, ${inputDim}]`);
    }

    aiReady = true;
    console.log("🧠 AI Engine Ready");

  } catch (e) {
    alert("AI failed to load. Check console.");
    console.error(e);
  }
}

loadAI();

/* LOADER TIMER */
function showLoader(sec = 3) {
  const loader = document.getElementById("loader");
  const loaderText = document.getElementById("loaderText");
  const timerEl = document.getElementById("timer");

  loader.classList.remove("hidden");
  loaderText.classList.remove("hidden");
  let t = sec;
  timerEl.textContent = t;

  const interval = setInterval(() => {
    t--;
    timerEl.textContent = t;
    if (t <= 0) clearInterval(interval);
  }, 1000);
}

function hideLoader() {
  document.getElementById("loader").classList.add("hidden");
  document.getElementById("loaderText").classList.add("hidden");
}

/* FEATURE EXTRACTION */
function extractFeatures(urlStr) {
  const u = new URL(urlStr);
  const h = u.hostname;
  const c = r => (urlStr.match(r) || []).length;

  return [
    urlStr.length, h.length,
    /^\d+\.\d+\.\d+\.\d+$/.test(h) ? 1 : 0,
    c(/\./g), c(/-/g), c(/@/g),
    c(/\?/g), c(/&/g), c(/\|/g),
    c(/=/g), c(/_/g), c(/%/g),
    c(/\//g), c(/\*/g), c(/:/g),
    c(/,/g), c(/\$/g),
    (urlStr.match(/www/g) || []).length,
    (urlStr.match(/\.com/g) || []).length,
    c(/\/\//g),
    urlStr.includes("http") ? 1 : 0,
    urlStr.includes("https") ? 1 : 0,
    (urlStr.match(/\d/g) || []).length / urlStr.length,
    (h.match(/\d/g) || []).length / h.length,
    h.includes("xn--") ? 1 : 0,
    u.port ? 1 : 0,
    urlStr.includes(h.split(".").pop()) ? 1 : 0,
    h.split(".").length > 3 ? 1 : 0,
    h.startsWith("www.") ? 0 : 1,
    h.split(".").length - 2,
    h.includes("-") ? 1 : 0,
    h.length > 20 ? 1 : 0,
    /bit\.ly|tinyurl|goo\.gl/.test(urlStr) ? 1 : 0,
    /\.(php|html|asp|exe)$/.test(urlStr) ? 1 : 0
  ];
}

/* NORMALIZATION */
function normalize(x) {
  return x.map((v, i) => (v - scaler.mean[i]) / scaler.scale[i]);
}

/* ANALYZE URL */
async function analyze() {
  if (!aiReady) {
    showLoader(3);
    alert("AI engine still loading, please wait.");
    return;
  }

  let url = document.getElementById("urlInput").value.trim();
  if (!url) return;
  if (!url.startsWith("http")) url = "https://" + url;

  if (url.includes("google.com") || url.includes("github.com")) {
    render(url, 0.02);
    return;
  }

  showLoader(2);
  const raw = extractFeatures(url);

  if (raw.length !== scaler.mean.length) {
    hideLoader();
    alert("Feature mismatch with trained model");
    return;
  }

  const inputTensor = tf.tensor2d([normalize(raw)], [1, raw.length]);
  const prob = (await model.predict(inputTensor).data())[0];
  tf.dispose(inputTensor);

  hideLoader();
  render(url, prob);
}

/* RENDER RESULTS */
function render(url, p) {
  const r = Math.round(p * 100);
  const lvl = r > 80 ? "CRITICAL" : r > 60 ? "HIGH" : r > 40 ? "MEDIUM" : "LOW";

  document.getElementById("terminalOutput").textContent = `
SCAN
[+] TensorFlow.js Phishing Scan
----------------------------------------
Target       : ${url}
ML Risk Prob : ${r}%
Threat Level : ${lvl}
----------------------------------------
> AI Verdict : ${r > 60 ? "PHISHING SUSPECTED" : "LIKELY SAFE"}
> Engine    : TF.JS ACTIVE`;

  document.getElementById("result").classList.remove("hidden");
}
</script>
</body>

</html>
