<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Cyber URL Analyzer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="link.ico">
  <style>
@import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap");

:root {
  --cyber: #00e7ff;
  --cyber-soft: #7df9ff;
  --bg: #020617;
  --panel: #020617;
  --border: #0f2a33;
  --text-dim: #7dd3fc;
}

* {
  box-sizing: border-box;
  font-family: "JetBrains Mono", monospace;
}

body {
  margin: 0;
  background: radial-gradient(circle at top, #04131a, #020617 60%);
  color: var(--cyber);
  overflow-x: hidden;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(0, 231, 255, 0.03),
    rgba(0, 231, 255, 0.03) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events: none;
  z-index: 5;
}

.top-bar {
  padding: 20px 30px;
  border-bottom: 1px solid var(--border);
}

.top-bar h1 {
  margin: 0;
  text-shadow: 0 0 10px var(--cyber);
}

.top-bar p {
  margin-top: 4px;
  font-size: 13px;
  color: var(--text-dim);
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 40px 20px;
}

.card {
  background: linear-gradient(
    180deg,
    rgba(0, 231, 255, 0.03),
    rgba(0, 0, 0, 0.3)
  );
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 30px;
}

.input-box {
  display: flex;
  align-items: center;
  gap: 10px;
}

.input-box span {
  color: var(--text-dim);
}

input {
  flex: 1;
  background: black;
  border: 1px solid var(--cyber);
  padding: 10px;
  color: var(--cyber);
}

button {
  padding: 10px 22px;
  background: transparent;
  border: 1px solid var(--cyber);
  color: var(--cyber);
  cursor: pointer;
}

.loader {
  margin: 20px auto 0;
  width: 42px;
  height: 42px;
  border: 3px solid var(--cyber);
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.hidden { display: none; }

.footer {
  border-top: 1px solid var(--border);
  padding: 30px 20px;
  text-align: center;
  color: var(--text-dim);
  font-size: 13px;
}
  </style>
</head>

<body>

<header class="top-bar">
  <h1>🛡 AI CYBER URL ANALYZER</h1>
  <p>> Advanced Phishing Detection Engine v4.0</p>
</header>

<main class="container">
  <div class="card">
    <label>Target URL</label>
    <div class="input-box">
      <span>root@cyber:~$</span>
      <input id="urlInput" placeholder="https://example.com" />
      <button onclick="analyze()">SCAN</button>
    </div>

    <div id="loader" class="loader hidden"></div>
    <div id="loaderText" class="hidden" style="text-align:center;font-size:12px;margin-top:8px;">
      Initializing AI… <span id="timer">3</span>s
    </div>
  </div>

  <div id="result" class="card hidden">
    <pre id="terminalOutput"></pre>
  </div>
</main>

<footer class="footer">
  <p>Client-side phishing detection using TensorFlow.js</p>
  <p>Built by <strong>Tirth Bhatt</strong> © 2026</p>
</footer>

<script>
let aiReady = true;

/* ================= OFFLINE PHISHING FEED ================= */
/* Simulated cached feeds (update manually weekly) */
const PHISHING_FEED = [
  "paypal-secure-login.com",
  "apple-id-verify.net",
  "google-account-warning.com",
  "microsoft-auth-alert.net",
  "amazon-security-check.com"
];

/* ================= BEHAVIOR MEMORY ================= */
let scanHistory = [];

/* ================= LOADER ================= */
function showLoader(sec = 2) {
  const loader = document.getElementById("loader");
  const text = document.getElementById("loaderText");
  const timer = document.getElementById("timer");

  loader.classList.remove("hidden");
  text.classList.remove("hidden");

  let t = sec;
  timer.textContent = t;

  const i = setInterval(() => {
    t--;
    timer.textContent = t;
    if (t <= 0) clearInterval(i);
  }, 1000);
}

function hideLoader() {
  document.getElementById("loader").classList.add("hidden");
  document.getElementById("loaderText").classList.add("hidden");
}

/* ================= ENTROPY ================= */
function entropy(str) {
  const map = {};
  for (let c of str) map[c] = (map[c] || 0) + 1;

  return Object.values(map).reduce((e, f) => {
    const p = f / str.length;
    return e - p * Math.log2(p);
  }, 0);
}

/* ================= RULE ENGINE ================= */
function ruleEngine(urlStr) {
  const u = new URL(urlStr);
  const h = u.hostname.toLowerCase();

  let score = 0;
  const breakdown = [];

  const add = (name, val) => {
    score += val;
    breakdown.push({ name, val });
  };

  const keywords = ["login","verify","secure","account","bank","update","password"];
  const brands = ["google","paypal","amazon","facebook","apple","microsoft"];

  /* 🌐 OFFLINE FEED CHECK */
  if (PHISHING_FEED.includes(h)) add("Threat Feed Match", 90);

  /* 🚨 CORE RULES */
  if (urlStr.includes("@")) add("@ Symbol", 60);
  if (/^(\d+\.){3}\d+$/.test(h)) add("IP Address", 50);
  if (keywords.some(k => urlStr.includes(k))) add("Phishing Keywords", 25);

  if (brands.some(b => urlStr.includes(b) && !h.includes(b)))
    add("Brand Impersonation", 50);

  if (h.length > 25) add("Long Domain", 15);
  if (h.split(".").length > 3) add("Too Many Subdomains", 20);
  if (h.includes("-")) add("Hyphen Domain", 10);

  if (urlStr.length > 120) add("Long URL", 20);
  if (/bit\.ly|tinyurl/.test(urlStr)) add("Shortened URL", 40);

  const ent = entropy(h);
  if (ent > 3.8) add("High Entropy", 25);

  if (!urlStr.startsWith("https")) add("No HTTPS", 10);

  /* 🧠 BEHAVIOR-BASED DETECTION */
  const similar = scanHistory.filter(x => x.domain === h);
  if (similar.length > 2) add("Repeated Suspicious Domain", 30);

  return {
    score: Math.min(score, 100) / 100,
    breakdown
  };
}

/* ================= GRAPH ================= */
function drawGraph(score) {
  let canvas = document.getElementById("riskGraph");
  if (!canvas) {
    canvas = document.createElement("canvas");
    canvas.id = "riskGraph";
    canvas.height = 120;
    document.getElementById("result").appendChild(canvas);
  }

  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  canvas.width = 300;
  canvas.height = 120;

  ctx.strokeStyle = "#00e7ff";
  ctx.lineWidth = 2;

  ctx.beginPath();
  for (let i = 0; i <= score; i++) {
    const x = (i / 100) * 300;
    const y = 120 - (i + Math.sin(i / 5) * 10);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();
}

/* ================= ANALYZE ================= */
function analyze() {
  let url = document.getElementById("urlInput").value.trim();
  if (!url) return;

  if (!url.startsWith("http")) url = "https://" + url;

  showLoader(2);

  setTimeout(() => {
    const { score, breakdown } = ruleEngine(url);

    // store behavior history
    scanHistory.push({
      domain: new URL(url).hostname,
      score
    });

    hideLoader();
    render(url, score, breakdown);
  }, 1200);
}

/* ================= OUTPUT ================= */
function render(url, prob, breakdown) {
  const r = Math.round(prob * 100);

  const lvl =
    r > 85 ? "CRITICAL" :
    r > 65 ? "HIGH" :
    r > 40 ? "MEDIUM" : "LOW";

  drawGraph(r);

  let details = breakdown.map(b => `- ${b.name} (+${b.val})`).join("\n");

  document.getElementById("terminalOutput").textContent = `
SCAN
[+] Cyber Intelligence Scan v6
----------------------------------------
Target        : ${url}
Risk Score    : ${r}%
Threat Level  : ${lvl}
----------------------------------------
Threat Intelligence:
- Offline Feed Matching
- Behavior Tracking
- Entropy Analysis
- Brand Spoof Detection
----------------------------------------
Breakdown:
${details}
----------------------------------------
> Verdict : ${r > 60 ? "PHISHING SUSPECTED" : "LIKELY SAFE"}
> Engine  : CYBER AI (RULE + BEHAVIOR + FEED)`;

  document.getElementById("result").classList.remove("hidden");
}
</script>
</body>

</html>
